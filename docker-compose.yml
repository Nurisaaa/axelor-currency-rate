services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: axelor
      POSTGRES_PASSWORD: 1111
      POSTGRES_DB: axelor-open-suite
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  postgres_data:
